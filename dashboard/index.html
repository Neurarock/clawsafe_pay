<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ClawSafe Pay — Dashboard</title>
<style>
/* ── Reset & Base ─────────────────────────────────────────────────────── */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0a0e17;--surface:#111827;--surface2:#1f2937;--border:#374151;
  --text:#f9fafb;--muted:#9ca3af;--accent:#6366f1;--accent2:#818cf8;
  --green:#10b981;--red:#ef4444;--amber:#f59e0b;--cyan:#06b6d4;
  --blue:#3b82f6;--purple:#a855f7;
}
body{font-family:'Inter','SF Pro Display',-apple-system,BlinkMacSystemFont,system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}

/* ── Animated Background ──────────────────────────────────────────────── */
.bg-grid{position:fixed;inset:0;z-index:0;opacity:.03;
  background-image:linear-gradient(var(--accent) 1px,transparent 1px),linear-gradient(90deg,var(--accent) 1px,transparent 1px);
  background-size:60px 60px;animation:gridMove 20s linear infinite}
@keyframes gridMove{to{background-position:60px 60px}}

.bg-glow{position:fixed;width:600px;height:600px;border-radius:50%;filter:blur(120px);opacity:.12;z-index:0;animation:glowPulse 6s ease-in-out infinite alternate}
.bg-glow.g1{background:var(--accent);top:-200px;left:-100px}
.bg-glow.g2{background:var(--cyan);bottom:-200px;right:-100px;animation-delay:3s}
@keyframes glowPulse{0%{opacity:.08;transform:scale(1)}100%{opacity:.15;transform:scale(1.2)}}

/* ── Layout ───────────────────────────────────────────────────────────── */
.app{position:relative;z-index:1;max-width:1200px;margin:0 auto;padding:24px 20px}

/* ── Header ───────────────────────────────────────────────────────────── */
header{display:flex;align-items:center;justify-content:space-between;margin-bottom:32px;padding:20px 24px;background:linear-gradient(135deg,rgba(99,102,241,.08),rgba(6,182,212,.06));border:1px solid rgba(99,102,241,.15);border-radius:16px;backdrop-filter:blur(12px)}
.logo{display:flex;align-items:center;gap:14px}
.logo-icon{width:44px;height:44px;border-radius:12px;background:linear-gradient(135deg,var(--accent),var(--cyan));display:flex;align-items:center;justify-content:center;font-size:22px;animation:logoGlow 3s ease-in-out infinite alternate}
@keyframes logoGlow{0%{box-shadow:0 0 20px rgba(99,102,241,.3)}100%{box-shadow:0 0 30px rgba(6,182,212,.4)}}
.logo h1{font-size:22px;font-weight:700;background:linear-gradient(135deg,#fff,var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.logo .sub{font-size:12px;color:var(--muted);font-weight:400;letter-spacing:.5px}
.network-badge{display:flex;align-items:center;gap:8px;padding:8px 16px;border-radius:99px;background:rgba(16,185,129,.1);border:1px solid rgba(16,185,129,.2);font-size:13px;color:var(--green);font-weight:500}
.network-dot{width:8px;height:8px;border-radius:50%;background:var(--green);animation:blink 2s ease-in-out infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}

/* ── Stats Bar ────────────────────────────────────────────────────────── */
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:12px;margin-bottom:28px}
.stat-card{padding:16px 18px;border-radius:12px;background:var(--surface);border:1px solid var(--border);transition:all .3s ease}
.stat-card:hover{border-color:var(--accent);transform:translateY(-2px);box-shadow:0 8px 24px rgba(99,102,241,.1)}
.stat-label{font-size:11px;text-transform:uppercase;letter-spacing:1px;color:var(--muted);margin-bottom:6px}
.stat-value{font-size:26px;font-weight:700;font-variant-numeric:tabular-nums}
.stat-value.green{color:var(--green)}.stat-value.red{color:var(--red)}.stat-value.amber{color:var(--amber)}.stat-value.blue{color:var(--blue)}.stat-value.purple{color:var(--purple)}

/* ── Form Panel ───────────────────────────────────────────────────────── */
.panel{padding:24px;border-radius:16px;background:var(--surface);border:1px solid var(--border);margin-bottom:28px}
.panel-title{font-size:16px;font-weight:600;margin-bottom:18px;display:flex;align-items:center;gap:10px}
.panel-title .icon{font-size:18px}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.form-group{display:flex;flex-direction:column;gap:5px}
.form-group.full{grid-column:1/-1}
.form-group label{font-size:12px;font-weight:500;color:var(--muted);text-transform:uppercase;letter-spacing:.5px}
.form-group input,.form-group textarea{
  padding:11px 14px;border-radius:10px;border:1px solid var(--border);background:var(--bg);
  color:var(--text);font-size:14px;font-family:inherit;transition:all .2s;outline:none;resize:none}
.form-group input:focus,.form-group textarea:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(99,102,241,.15)}
.form-group input::placeholder,.form-group textarea::placeholder{color:#4b5563}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:12px 28px;
  border-radius:10px;border:none;font-size:14px;font-weight:600;cursor:pointer;transition:all .25s;font-family:inherit}
.btn-primary{background:linear-gradient(135deg,var(--accent),#4f46e5);color:#fff;margin-top:6px}
.btn-primary:hover{transform:translateY(-1px);box-shadow:0 8px 20px rgba(99,102,241,.35)}
.btn-primary:active{transform:translateY(0)}
.btn-primary:disabled{opacity:.5;cursor:not-allowed;transform:none}

/* ── Transaction Table ────────────────────────────────────────────────── */
.table-wrap{border-radius:16px;overflow:hidden;border:1px solid var(--border);background:var(--surface)}
.table-header{display:flex;align-items:center;justify-content:space-between;padding:16px 20px;border-bottom:1px solid var(--border)}
.table-header h2{font-size:16px;font-weight:600;display:flex;align-items:center;gap:8px}
.refresh-btn{padding:6px 14px;border-radius:8px;border:1px solid var(--border);background:transparent;color:var(--muted);cursor:pointer;font-size:12px;font-weight:500;transition:all .2s}
.refresh-btn:hover{border-color:var(--accent);color:var(--accent)}

table{width:100%;border-collapse:collapse}
thead{background:rgba(255,255,255,.02)}
th{padding:12px 16px;text-align:left;font-size:11px;text-transform:uppercase;letter-spacing:.8px;color:var(--muted);font-weight:500;border-bottom:1px solid var(--border)}
td{padding:14px 16px;border-bottom:1px solid rgba(55,65,81,.4);font-size:13px;vertical-align:middle}
tr{transition:background .15s}
tr:hover{background:rgba(99,102,241,.04)}
tr:last-child td{border-bottom:none}

.addr{font-family:'JetBrains Mono','Fira Code',monospace;font-size:12px;color:var(--cyan);word-break:break-all}
.hash-link{color:var(--cyan);text-decoration:none;font-family:'JetBrains Mono','Fira Code',monospace;font-size:12px}
.hash-link:hover{text-decoration:underline}
.amount{font-weight:600;font-variant-numeric:tabular-nums}
.note-text{color:var(--muted);font-size:12px;max-width:150px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.time-ago{color:var(--muted);font-size:12px}
.error-text{color:var(--red);font-size:11px;max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

/* ── Status Badges ────────────────────────────────────────────────────── */
.status-badge{display:inline-flex;align-items:center;gap:6px;padding:5px 12px;border-radius:99px;font-size:12px;font-weight:600;white-space:nowrap}
.status-pending,.status-building,.status-reviewing{background:rgba(99,102,241,.12);color:var(--accent2);border:1px solid rgba(99,102,241,.2)}
.status-signing,.status-pending_auth,.status-approved{background:rgba(245,158,11,.12);color:var(--amber);border:1px solid rgba(245,158,11,.2)}
.status-broadcast{background:rgba(6,182,212,.12);color:var(--cyan);border:1px solid rgba(6,182,212,.2)}
.status-confirmed{background:rgba(16,185,129,.12);color:var(--green);border:1px solid rgba(16,185,129,.2)}
.status-rejected,.status-expired,.status-failed,.status-blocked{background:rgba(239,68,68,.12);color:var(--red);border:1px solid rgba(239,68,68,.2)}

/* Spinner for in-progress statuses */
.status-spinner{width:12px;height:12px;border:2px solid transparent;border-top-color:currentColor;border-radius:50%;animation:spin .8s linear infinite;flex-shrink:0}
@keyframes spin{to{transform:rotate(360deg)}}

/* Pulse for pending approval */
.status-pulse{width:8px;height:8px;border-radius:50%;background:currentColor;animation:pulse 1.5s ease-in-out infinite;flex-shrink:0}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.4;transform:scale(1.4)}}

/* Checkmark for confirmed */
.status-check::before{content:'✓';font-weight:700;font-size:11px}

/* ── Toast Notification ───────────────────────────────────────────────── */
.toast-container{position:fixed;top:20px;right:20px;z-index:9999;display:flex;flex-direction:column;gap:8px}
.toast{padding:14px 20px;border-radius:12px;font-size:13px;font-weight:500;animation:slideIn .3s ease-out;backdrop-filter:blur(10px);border:1px solid;max-width:380px}
.toast.success{background:rgba(16,185,129,.15);border-color:rgba(16,185,129,.3);color:var(--green)}
.toast.error{background:rgba(239,68,68,.15);border-color:rgba(239,68,68,.3);color:var(--red)}
.toast.info{background:rgba(99,102,241,.15);border-color:rgba(99,102,241,.3);color:var(--accent2)}
@keyframes slideIn{from{transform:translateX(100%);opacity:0}to{transform:translateX(0);opacity:1}}
@keyframes slideOut{from{opacity:1}to{transform:translateX(100%);opacity:0}}

/* ── Row enter animation ──────────────────────────────────────────────── */
.row-enter{animation:rowFade .5s ease-out}
@keyframes rowFade{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:translateY(0)}}
.status-update{animation:statusFlash .6s ease-out}
@keyframes statusFlash{0%{background:rgba(99,102,241,.15)}100%{background:transparent}}

/* ── Empty state ──────────────────────────────────────────────────────── */
.empty-state{padding:60px 20px;text-align:center;color:var(--muted)}
.empty-state .icon{font-size:48px;margin-bottom:12px;opacity:.4}
.empty-state p{font-size:14px}

/* ── Responsive ───────────────────────────────────────────────────────── */
@media(max-width:768px){
  .form-grid{grid-template-columns:1fr}
  .stats{grid-template-columns:repeat(2,1fr)}
  header{flex-direction:column;gap:14px;text-align:center}
  th:nth-child(4),td:nth-child(4),th:nth-child(6),td:nth-child(6){display:none}
}
</style>
</head>
<body>

<div class="bg-grid"></div>
<div class="bg-glow g1"></div>
<div class="bg-glow g2"></div>

<div class="app">
  <!-- Header -->
  <header>
    <div class="logo">
      <div class="logo-icon">🔐</div>
      <div>
        <h1>ClawSafe Pay</h1>
        <div class="sub">Sepolia Transaction Dashboard</div>
      </div>
    </div>
    <div class="network-badge">
      <span class="network-dot"></span>
      Sepolia Testnet
    </div>
  </header>

  <!-- Stats -->
  <div class="stats" id="stats">
    <div class="stat-card"><div class="stat-label">Total</div><div class="stat-value" id="s-total">0</div></div>
    <div class="stat-card"><div class="stat-label">Confirmed</div><div class="stat-value green" id="s-confirmed">0</div></div>
    <div class="stat-card"><div class="stat-label">Pending Approval</div><div class="stat-value amber" id="s-pending">0</div></div>
    <div class="stat-card"><div class="stat-label">Failed / Rejected</div><div class="stat-value red" id="s-failed">0</div></div>
    <div class="stat-card"><div class="stat-label">Volume (ETH)</div><div class="stat-value purple" id="s-volume">0.000</div></div>
  </div>

  <!-- Submit Form -->
  <div class="panel">
    <div class="panel-title"><span class="icon">✦</span> New Transaction</div>
    <form id="txForm" autocomplete="off">
      <div class="form-grid">
        <div class="form-group">
          <label>From User</label>
          <input type="text" id="f-from" placeholder="alice" value="alice" required>
        </div>
        <div class="form-group">
          <label>To User</label>
          <input type="text" id="f-to" placeholder="bob" value="bob" required>
        </div>
        <div class="form-group full">
          <label>Recipient Address</label>
          <input type="text" id="f-addr" placeholder="0x..." value="0x52492C6B4635E6b87f2043A6Ac274Be458060b48" required>
        </div>
        <div class="form-group">
          <label>Amount (ETH)</label>
          <input type="text" id="f-amount" placeholder="0.01" value="0.001" required>
        </div>
        <div class="form-group">
          <label>Note</label>
          <input type="text" id="f-note" placeholder="Payment for..." value="Dashboard demo tx">
        </div>
        <div class="form-group full" style="flex-direction:row;align-items:end;gap:14px">
          <button type="submit" class="btn btn-primary" id="submitBtn">
            <span id="btnText">🚀 Send Transaction</span>
            <span id="btnSpinner" style="display:none" class="status-spinner"></span>
          </button>
        </div>
      </div>
    </form>
  </div>

  <!-- Transaction Table -->
  <div class="table-wrap">
    <div class="table-header">
      <h2>📋 Transactions</h2>
      <button class="refresh-btn" onclick="fetchIntents()">↻ Refresh</button>
    </div>
    <div id="tableContainer">
      <table>
        <thead>
          <tr>
            <th>Intent</th>
            <th>Status</th>
            <th>From → To</th>
            <th>Address</th>
            <th>Amount</th>
            <th>Note</th>
            <th>Tx Hash</th>
            <th>Time</th>
          </tr>
        </thead>
        <tbody id="txBody"></tbody>
      </table>
      <div class="empty-state" id="emptyState">
        <div class="icon">📤</div>
        <p>No transactions yet. Submit one above!</p>
      </div>
    </div>
  </div>
</div>

<div class="toast-container" id="toasts"></div>

<script>
const API = window.location.origin;
const API_KEY = 'change-me-publisher-key';
let prevStatuses = {};
let intentCounter = 0;
let pollTimer = null;

// ── Toast ────────────────────────────────────────────────────────────
function toast(msg, type = 'info') {
  const c = document.getElementById('toasts');
  const el = document.createElement('div');
  el.className = `toast ${type}`;
  el.textContent = msg;
  c.appendChild(el);
  setTimeout(() => { el.style.animation = 'slideOut .3s forwards'; setTimeout(() => el.remove(), 300); }, 4000);
}

// ── Format helpers ───────────────────────────────────────────────────
function weiToEth(wei) { return (BigInt(wei) * 1000000n / BigInt(1e18)).toString() / 1e6; }
function shortAddr(a) { return a ? a.slice(0, 6) + '…' + a.slice(-4) : ''; }
function shortHash(h) { return h ? h.slice(0, 10) + '…' + h.slice(-6) : ''; }
function timeAgo(iso) {
  const s = Math.floor((Date.now() - new Date(iso).getTime()) / 1000);
  if (s < 60) return s + 's ago';
  if (s < 3600) return Math.floor(s / 60) + 'm ago';
  if (s < 86400) return Math.floor(s / 3600) + 'h ago';
  return Math.floor(s / 86400) + 'd ago';
}

function statusBadge(status) {
  const inProgress = ['pending', 'building', 'reviewing'].includes(status);
  const pendingAuth = ['signing', 'pending_auth', 'approved'].includes(status);
  const confirmed = status === 'confirmed';
  const broadcast = status === 'broadcast';
  let inner = '';
  if (inProgress) inner = `<span class="status-spinner"></span>`;
  else if (pendingAuth) inner = `<span class="status-pulse"></span>`;
  else if (confirmed) inner = `<span class="status-check"></span>`;
  else if (broadcast) inner = `<span class="status-spinner"></span>`;
  return `<span class="status-badge status-${status}">${inner}${status.replace('_', ' ')}</span>`;
}

function etherscanLink(hash) {
  if (!hash) return '—';
  return `<a class="hash-link" href="https://sepolia.etherscan.io/tx/${hash}" target="_blank" rel="noopener">${shortHash(hash)}</a>`;
}

// ── Fetch intents ────────────────────────────────────────────────────
async function fetchIntents() {
  try {
    const r = await fetch(`${API}/intents`, { headers: { 'X-API-Key': API_KEY } });
    if (!r.ok) throw new Error(`HTTP ${r.status}`);
    const data = await r.json();
    renderTable(data);
    renderStats(data);
  } catch (e) {
    console.error('Fetch error:', e);
  }
}

function renderStats(data) {
  document.getElementById('s-total').textContent = data.length;
  const confirmed = data.filter(d => d.status === 'confirmed').length;
  const pending = data.filter(d => ['signing', 'pending_auth', 'approved', 'pending', 'building', 'reviewing'].includes(d.status)).length;
  const failed = data.filter(d => ['failed', 'rejected', 'expired', 'blocked'].includes(d.status)).length;
  document.getElementById('s-confirmed').textContent = confirmed;
  document.getElementById('s-pending').textContent = pending;
  document.getElementById('s-failed').textContent = failed;
  const vol = data.filter(d => d.status === 'confirmed').reduce((s, d) => s + weiToEth(d.amount_wei), 0);
  document.getElementById('s-volume').textContent = vol.toFixed(6);
}

function renderTable(data) {
  const body = document.getElementById('txBody');
  const empty = document.getElementById('emptyState');
  empty.style.display = data.length ? 'none' : 'block';

  const html = data.map(d => {
    const isNew = !prevStatuses[d.intent_id];
    const changed = prevStatuses[d.intent_id] && prevStatuses[d.intent_id] !== d.status;
    prevStatuses[d.intent_id] = d.status;
    const cls = isNew ? 'row-enter' : (changed ? 'status-update' : '');
    const errTip = d.error_message ? `<div class="error-text" title="${d.error_message.replace(/"/g, '&quot;')}">⚠ ${d.error_message}</div>` : '';
    return `<tr class="${cls}">
      <td><code style="font-size:12px;color:var(--accent2)">${d.intent_id}</code></td>
      <td>${statusBadge(d.status)}${errTip}</td>
      <td><strong>${d.from_user}</strong> → <strong>${d.to_user}</strong></td>
      <td class="addr">${shortAddr(d.to_address)}</td>
      <td class="amount">${weiToEth(d.amount_wei)} ETH</td>
      <td class="note-text" title="${(d.note||'').replace(/"/g,'&quot;')}">${d.note || '—'}</td>
      <td>${etherscanLink(d.tx_hash)}</td>
      <td class="time-ago">${timeAgo(d.created_at)}</td>
    </tr>`;
  }).join('');
  body.innerHTML = html;
}

// ── Submit new intent ────────────────────────────────────────────────
document.getElementById('txForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  const btn = document.getElementById('submitBtn');
  const btnText = document.getElementById('btnText');
  const btnSpin = document.getElementById('btnSpinner');
  btn.disabled = true;
  btnText.textContent = 'Submitting…';
  btnSpin.style.display = 'inline-block';

  const ethAmount = parseFloat(document.getElementById('f-amount').value);
  const amountWei = BigInt(Math.round(ethAmount * 1e18)).toString();

  intentCounter++;
  const intentId = `dash-${Date.now()}-${intentCounter}`;

  try {
    const r = await fetch(`${API}/intent`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'X-API-Key': API_KEY },
      body: JSON.stringify({
        intent_id: intentId,
        from_user: document.getElementById('f-from').value,
        to_user: document.getElementById('f-to').value,
        to_address: document.getElementById('f-addr').value,
        amount_wei: amountWei,
        note: document.getElementById('f-note').value,
      }),
    });
    const data = await r.json();
    if (r.ok) {
      toast(`✓ Transaction ${intentId} submitted!`, 'success');
      fetchIntents();
      // Start fast polling for this intent
      startFastPoll();
    } else {
      toast(`✗ ${data.detail || JSON.stringify(data)}`, 'error');
    }
  } catch (err) {
    toast(`✗ Network error: ${err.message}`, 'error');
  } finally {
    btn.disabled = false;
    btnText.textContent = '🚀 Send Transaction';
    btnSpin.style.display = 'none';
  }
});

// ── Polling ──────────────────────────────────────────────────────────
let fastPollCount = 0;
function startFastPoll() {
  fastPollCount = 0;
  if (pollTimer) clearInterval(pollTimer);
  pollTimer = setInterval(() => {
    fetchIntents();
    fastPollCount++;
    if (fastPollCount > 60) { // 2 minutes of fast polling
      clearInterval(pollTimer);
      pollTimer = setInterval(fetchIntents, 5000); // back to slow
    }
  }, 2000);
}

// Initial load + slow poll
fetchIntents();
pollTimer = setInterval(fetchIntents, 5000);
</script>
</body>
</html>
